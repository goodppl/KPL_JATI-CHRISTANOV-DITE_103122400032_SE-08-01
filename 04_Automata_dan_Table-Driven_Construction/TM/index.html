<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guthib</title>
    <link rel="stylesheet" href="./index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Gideon+Roman&family=Inconsolata:wght@200..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>Pengkonversi Gaya Teks</h1>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>
    <label for="editor-kecil">Masukkan teks:</label>
    <textarea class="kotak-input" id="editor-kecil" rows="10" cols="60" placeholder="Kata-kata..."></textarea>
    <p>
        Huruf: <span id="hf">0</span>,
        huruf besar: <span id="hb">0</span>,
        huruf kecil: <span id="hk">0</span>
    </p>
    <div>
        <button id="huruf-besar">Besarkan</button>
        <button id="huruf-kecil">Kecilkan</button>
        <button id="huruf-paragraf">Paragraf</button>
    </div>
    <div class="grup-tg" id="mode-div">
        <button id="tombol-terang" value="light">Mode Terang</button>
        <button id="tombol-gelap" value="dark">Mode Gelap</button>
        <button id="tombol-sepia" value="sepia">Mode Sepia</button>
    </div>
    <script src="./index.js"></script>
</body>

</html>
